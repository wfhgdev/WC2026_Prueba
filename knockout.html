<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026 — Knockout Stage</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-50/40 min-h-screen">

  <header class="border-b border-gray-100 bg-white">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-black italic text-gray-900">FIFA WORLD CUP <span class="text-purple-700">2026</span></a>
      <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-gray-600">
        <a href="index.html" class="hover:text-gray-900">MATCHES</a>
        <a href="groups.html" class="hover:text-gray-900">GROUPS</a>
        <a href="knockout.html" class="text-purple-700 border-b-2 border-purple-700 pb-1">KNOCKOUT</a>
        <a href="stats.html" class="hover:text-gray-900">STATS</a>
      </nav>
      <button class="bg-purple-700 text-white text-sm font-bold px-5 py-2.5 rounded-lg hover:bg-purple-800">TICKETS</button>
    </div>
  </header>

  <section class="max-w-7xl mx-auto px-6 py-10 text-center">
    <h1 class="text-5xl font-black text-gray-900">Knockout Stage</h1>
    <p class="text-gray-500 mt-3">The final 32 teams battle for glory.</p>
  </section>

  <main class="max-w-7xl mx-auto px-6 pb-16 overflow-x-auto">
    <div id="bracket-container" class="flex gap-10 min-w-max">
      <div class="animate-pulse h-64 w-56 bg-white rounded-xl border border-gray-100"></div>
      <div class="animate-pulse h-64 w-56 bg-white rounded-xl border border-gray-100"></div>
      <div class="animate-pulse h-64 w-56 bg-white rounded-xl border border-gray-100"></div>
      <div class="animate-pulse h-64 w-56 bg-white rounded-xl border border-gray-100"></div>
      <div class="animate-pulse h-64 w-56 bg-white rounded-xl border border-gray-100"></div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 text-sm">
    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between gap-4">
      <span class="font-black italic text-white">FIFA WORLD CUP 2026</span>
      <span>© 2026 FIFA World Cup. All Rights Reserved.</span>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/knockout.js"></script>
</body>
</html>
